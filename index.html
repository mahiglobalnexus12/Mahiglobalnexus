<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahi Global Nexus</title>

<style>
body{font-family:Arial;margin:0;background:#0f172a;color:white}
header{text-align:center;padding:20px;background:#020617}
.logo{width:140px}
.container{padding:20px}
.search{padding:10px;width:300px;border-radius:5px;border:none;margin:20px auto;display:block}
.products{display:flex;flex-wrap:wrap;gap:20px;justify-content:center}
.card{background:#1e293b;padding:15px;border-radius:10px;width:220px;cursor:pointer}
.card img{width:100%;border-radius:8px}
.details{display:none;background:#020617;padding:20px;margin-top:20px}
button{padding:10px 14px;border:none;border-radius:5px;margin:5px;cursor:pointer}
.whatsapp{background:#25D366;color:white}
.call{background:#eab308}
.admin{background:#020617;padding:20px;margin-top:40px}
input,textarea{width:100%;padding:8px;margin:8px 0;border:none;border-radius:5px}
</style>
</head>

<body>

<header>
<img src="Mahi EXIM Logo.png" class="logo">
<h1>Mahi Global Nexus</h1>
<p>Kannad, Dist. Chhatrapati Sambhajinagar (Aurangabad)</p>
</header>

<div class="container">

<input id="search" class="search" placeholder="Search products..." onkeyup="searchProduct()">

<div id="products" class="products"></div>

<div id="details" class="details"></div>

<div id="adminLogin" class="admin">
<h3>Admin Login</h3>
<input id="adminPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="adminPanel" class="admin" style="display:none">
<h3>Add Product</h3>
<input id="pname" placeholder="Product Name">
<input id="pimage" placeholder="Image name (example: onion.jpeg)">
<textarea id="pdesc" placeholder="Description"></textarea>
<button onclick="addProduct()">Add Product</button>
</div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products") || `[
{"name":"Fresh Onion","image":"Fresh Onion photo.jpeg","desc":"Farm fresh onion"},
{"name":"Tomato","image":"Tamato photo.jpeg","desc":"Fresh tomato"},
{"name":"Potato","image":"Potato photo.jpeg","desc":"Export quality potato"}
]`);

function render(list=products){
let html="";
list.forEach((p,i)=>{
html+=`<div class="card" onclick="show(${i})">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>${p.desc}</p>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function show(i){
let p=products[i];
let msg=`Hello I want ${p.name}`;
let wa=`https://wa.me/918830577532?text=${encodeURIComponent(msg)}`;

document.getElementById("details").style.display="block";
document.getElementById("details").innerHTML=`
<h2>${p.name}</h2>
<img src="${p.image}" width="300">
<p>${p.desc}</p>
<button class="whatsapp" onclick="window.open('${wa}')">WhatsApp</button>
<button class="call" onclick="window.location='tel:+918830577532'">Call</button>
`;
}

function addProduct(){
let name=pname.value;
let image=pimage.value;
let desc=pdesc.value;

products.push({name,image,desc});
localStorage.setItem("products",JSON.stringify(products));
render();
}

function searchProduct(){
let q=search.value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(q)));
}

function login(){
if(adminPass.value==="mahiglobal123"){
adminLogin.style.display="none";
adminPanel.style.display="block";
}else{
alert("Wrong Password");
}
}

render();

</script>

</body>
</html>
